<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이고리치 명함 🐾</title>
    <style>
        /* 공주님이 요청하신 부드러운 파스텔 옐로우 배경! */
        body { font-family: 'Pretendard', sans-serif; background-color: #FFF9C4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .card { background: white; width: 340px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); overflow: hidden; text-align: center; border: 4px solid #FFF176; }
        
        .photo-area { width: 100%; height: 300px; background-color: #FFFDE7; overflow: hidden; }
        /* 사진이 무조건 뜨도록 설정! 파일명 rich.jpg와 동일해야 합니다. */
        .photo-area img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .info { padding: 25px; }
        h1 { margin: 0 0 15px 0; color: #FBC02D; font-size: 26px; font-weight: 800; }
        
        /* 스탯 박스도 부드러운 파스텔 톤으로! */
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; background: #FFFDE7; padding: 12px; border-radius: 15px; }
        .stat-item span { display: block; font-size: 12px; color: #D4B106; margin-bottom: 4px; font-weight: 600; }
        .stat-item strong { font-size: 16px; color: #AF9500; }
        
        /* 취향 4종 세트 그리드 */
        .likes-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
        .like-box { background: #FFFFFF; padding: 10px; border-radius: 12px; border: 1.5px solid #FFF9C4; }
        .like-title { font-size: 11px; color: #FBC02D; margin-bottom: 3px; font-weight: 800; }
        .like-content { font-size: 13px; color: #666; font-weight: bold; }

        .footer { font-size: 12px; color: #D4B106; margin-top: 25px; padding-top: 10px; border-top: 2px dashed #FFF9C4; font-weight: 600; }
    </style>
</head>
<body>

    <div class="card">
        <div class="photo-area">
            <img src="./rich.jpg" alt="리치 사진">
        </div>
        <div class="info">
            <h1>🐾 리치 (Rich)</h1>
            
            <div class="stats">
                <div class="stat-item">
                    <span>가족이 된 지</span>
                    <strong id="family-days">계산 중...</strong>
                </div>
                <div class="stat-item">
                    <span>우리 리치 나이</span>
                    <strong id="age-days">계산 중...</strong>
                </div>
            </div>

            <div class="likes-container">
                <div class="like-box">
                    <div class="like-title">👤 좋아하는 사람</div>
                    <div class="like-content">가족 & 남자사람</div>
                </div>
                <div class="like-box">
                    <div class="like-title">🦴 좋아하는 간식</div>
                    <div class="like-content">양치껌, 열빙어</div>
                </div>
                <div class="like-box">
                    <div class="like-title">💬 좋아하는 단어</div>
                    <div class="like-content">"산책갈까?", "까까?"</div>
                </div>
                <div class="like-box">
                    <div class="like-title">🧸 좋아하는 장난감</div>
                    <div class="like-content">마카롱, 공</div>
                </div>
            </div>

            <div class="footer">Made by 이고융</div>
        </div>
    </div>

    <script>
        function getDays(startDate) {
            const start = new Date(startDate);
            const today = new Date();
            const diff = today - start;
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }
        // 리치의 실제 날짜를 여기에 넣어주세요! (YYYY-MM-DD 형식)
        document.getElementById('family-days').innerText = getDays('2022-02-04') + "일째"; 
        document.getElementById('age-days').innerText = getDays('2021-12-01') + "일째";
    </script>
</body>
</html>
