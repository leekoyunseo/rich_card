<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이고리치 명함 🐾</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #fffaf0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 340px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; text-align: center; border: 4px solid #ffd1dc; }
        .photo-area { width: 100%; height: 280px; overflow: hidden; background-color: #eee; }
        /* 공주님이 확인하신 소문자 rich.jpg를 정확히 불러옵니다! */
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 25px; }
        h1 { margin: 10px 0; color: #ff6b6b; font-size: 26px; }
        
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; background: #fff0f5; padding: 12px; border-radius: 15px; }
        .stat-item span { display: block; font-size: 13px; color: #ff8e8e; }
        .stat-item strong { font-size: 16px; color: #ff4757; }
        
        /* 공주님이 요청하신 취향 4종 세트 */
        .likes-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; margin-top: 15px; }
        .like-box { background: #fffcfc; padding: 12px; border-radius: 12px; border: 1px solid #ffe4e1; box-shadow: 2px 2px 5px rgba(0,0,0,0.02); }
        .like-title { font-size: 11px; color: #ff99aa; margin-bottom: 4px; font-weight: bold; }
        .like-content { font-size: 14px; color: #555; font-weight: bold; }

        .footer { font-size: 12px; color: #d3d3d3; margin-top: 25px; border-top: 1px dashed #ffd1dc; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="photo-area">
            <img src="rich.jpg" alt="귀여운 리치">
        </div>
        <div class="info">
            <h1>🐾 리치 (Rich)</h1>
            
            <div class="stats">
                <div class="stat-item">
                    <span>가족이 된 날</span>
                    <strong id="family-days">계산 중...</strong>
                </div>
                <div class="stat-item">
                    <span>리치의 나이</span>
                    <strong id="age-days">계산 중...</strong>
                </div>
            </div>

            <div class="likes-container">
                <div class="like-box">
                    <div class="like-title">👤 좋아하는 사람</div>
                    <div class="like-content">가족, 남자 사람</div>
                </div>
                <div class="like-box">
                    <div class="like-title">🦴 좋아하는 간식</div>
                    <div class="like-content">열빙어, 양치껌</div>
                </div>
                <div class="like-box">
                    <div class="like-title">💬 좋아하는 단어</div>
                    <div class="like-content">"산책", "까까?"</div>
                </div>
                <div class="like-box">
                    <div class="like-title">🧸 좋아하는 장난감</div>
                    <div class="like-content">마카롱, 공</div>
                </div>
            </div>

            <div class="footer">Created by 이고융 👑</div>
        </div>
    </div>

    <script>
        function getDays(startDate) {
            const start = new Date(startDate);
            const today = new Date();
            const diff = today - start;
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }
        // 공주님, 리치 실제 날짜(년-월-일)를 여기에 넣어주세요!
        document.getElementById('family-days').innerText = getDays('2022-02-04') + "일째"; 
        document.getElementById('age-days').innerText = getDays('2021-12-01') + "일째";
    </script>
</body>
</html>
