<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 집 막내 리치 명함 🐾</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #fdf6e3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 320px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; text-align: center; border: 3px solid #ffcc00; }
        .photo-area { width: 100%; height: 250px; overflow: hidden; background-color: #eee; }
        /* 사진 파일 이름은 무조건 rich.jpg 여야 합니다! */
        .photo-area img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 20px; }
        h1 { margin: 10px 0; color: #d35400; font-size: 24px; }
        p { color: #7f8c8d; margin: 5px 0; font-size: 15px; }
        .stats { display: flex; justify-content: space-around; margin-top: 15px; background: #fff9db; padding: 10px; border-radius: 10px; }
        .stat-item span { display: block; font-weight: bold; color: #f39c12; }
        .footer { font-size: 12px; color: #bdc3c7; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="photo-area">
            <img src="rich.jpg" alt="귀여운 리치">
        </div>
        <div class="info">
            <h1>🐾 리치 (Rich)</h1>
            <p>우리 집의 소중한 막내 공주님/왕자님</p>
            
            <div class="stats">
                <div class="stat-item">
                    <span>가족이 된 지</span>
                    <strong id="family-days">계산 중...</strong>
                </div>
                <div class="stat-item">
                    <span>현재 나이</span>
                    <strong id="age-days">계산 중...</strong>
                </div>
            </div>

            <p style="margin-top: 15px; font-weight: bold; color: #e67e22;">"간식 하나면 온 세상을 다 줄게!"</p>
            <div class="footer">Made by 22학번 이고윤서 공주님 👑</div>
        </div>
    </div>

    <script>
        // 날짜 자동 계산 함수
        function getDays(startDate) {
            const start = new Date(startDate);
            const today = new Date();
            const diff = today - start;
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        // 여기에 리치의 실제 날짜를 넣어주세요 (YYYY-MM-DD 형식)
        document.getElementById('family-days').innerText = getDays('2022-02-04') + "일째"; 
        document.getElementById('age-days').innerText = getDays('2022-12-01') + "일째";
    </script>
</body>
</html>
